name: GitHub-Profile-3D-Contrib

on:
  schedule:
    # Menggunakan cron job agar robot otomatis jalan setiap 12 jam sekali
    - cron: "0 */12 * * *"
  workflow_dispatch: # Baris ini agar kamu bisa mengetes atau menjalankan robot secara manual kapan saja

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v3
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "Automated Update: Pixel Repository City" || exit 0
          git push
          
