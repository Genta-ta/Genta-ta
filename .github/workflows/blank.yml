name: GitHub-Profile-3D-Grid

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # Menggunakan generator yang menghasilkan bentuk grid kotak persegi isometrik
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year # Ini yang bikin gridnya jadi kotak persegi, bukan setahun penuh
          filename: profile-3d-contrib/profile-square-isometric.svg

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "Automated Update: Square Isometric Grid" || exit 0
          git push
          
