name: GitHub-Profile-3D-Grid

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Generate grid
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate.js

      - name: Commit & Push
        run: |
          git config user.name "Genta-ta"
          git config user.email "your@email.com"
          git add -A .
          git commit -m "Automated Update: Repo Skyline Grid" || exit 0
          git push
